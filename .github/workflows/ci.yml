name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 22]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: plugins/codex-whatsapp
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: plugins/codex-whatsapp/package-lock.json
      - run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
      - run: npm test
      - run: npm run check
      - run: npm run test:mcp
      - run: npm run validate:plugin
